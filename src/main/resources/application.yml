server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**, /api/auth/**, /api/mileage/**

        - id: company-service
          uri: lb://company-service
          predicates:
            - Path=/api/companies/**

        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/products/**

        - id: cart-service
          uri: lb://cart-service
          predicates:
            - Path=/api/carts/**

        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**

        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**

        - id: shipment-service
          uri: lb://shipment-service
          predicates:
            - Path=/api/shipments/**

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**

        - id: review-service
          uri: lb://review-service
          predicates:
            - Path=/api/reviews/**

        - id: customer-service
          uri: lb://customer-service
          predicates:
            - Path=/api/cs/**

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://${EUREKA_HOSTNAME:eureka-server}:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health, info

