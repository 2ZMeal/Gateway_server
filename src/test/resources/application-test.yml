spring:
  application:
    name: api-gateway-test
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: keycloak
              uri: http://keycloak:8180
              predicates:
                - Path=/realms/easymeal/protocol/openid-connect/token, /realms/easymeal/protocol/openid-connect/certs, /realms/easymeal/.well-known/openid-configuration

            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/v1/users/**
